# ─── Judge0 configuration ──────────────────────────────
# These are sensible defaults for local development.
# For production, change every password / secret.

# Postgres
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0-local-pw

# Redis
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0-redis-pw

# Server
RAILS_ENV=production
SECRET_KEY_BASE=please-change-this-to-a-long-random-string-in-production

# Disable authentication for local dev — protect with AUTHN/AUTHZ tokens for prod
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# Resource limits (per submission)
MAX_CPU_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000
MAX_STACK_LIMIT=128000
MAX_PROCESSES_AND_OR_THREADS=120
MAX_MAX_FILE_SIZE=4096

# Workers
COUNT=2
INTERVAL=0.1

# Disable network in sandbox (CRITICAL for safety)
ENABLE_NETWORK=false
