<!doctype html>
<html><head><meta charset="utf-8"><title>Scholr</title>
<style>
  body { width: 320px; padding: 16px; font-family: Inter, sans-serif; background: #0b0a14; color: #f5f5f7; margin: 0; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  input, button { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #f5f5f7; font-size: 13px; box-sizing: border-box; }
  input { margin-bottom: 8px; }
  button { background: linear-gradient(135deg, #7c3aed, #22d3ee); border: 0; cursor: pointer; font-weight: 600; }
  .small { color: #9aa0aa; font-size: 11px; margin-top: 8px; }
  .status { margin-top: 8px; padding: 8px; border-radius: 8px; background: rgba(124,58,237,0.15); font-size: 12px; }
</style></head>
<body>
  <h1>Scholr Focus Blocker</h1>
  <label class="small">API URL</label>
  <input id="api" placeholder="http://localhost:5000/api" />
  <label class="small">Access token (from Scholr → Settings → Extension)</label>
  <input id="token" placeholder="eyJ..." />
  <button id="save">Save & sync</button>
  <div id="status" class="status">Idle</div>
  <p class="small">When a focus session is active, configured sites will be blocked.</p>
  <script src="popup.js"></script>
</body></html>
